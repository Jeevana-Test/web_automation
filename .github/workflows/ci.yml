name: Web Automation CI (Debug Tests)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Show folder structure
        run: |
          find . -name "*test*" -o -name "*Test*" | head -20
          ls -la tests/ || echo "No tests/ folder"

      - name: What pytest finds
        run: pytest --collect-only -v --tb=no

      - name: Run ALL tests
        run: pytest -v -s --tb=short PYTHONPATH=.
