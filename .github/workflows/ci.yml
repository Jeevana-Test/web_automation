
name: Web Automation CI (Fixed Path)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: List test files (debug)
        run: find tests -name "*.py" | head -5

      - name: Run Playwright tests
        run: pytest tests/ -v -s --tb=short
